<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EPCC — Clinic Decision Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --navy: #0d2340; --teal: #00BCD4; --gold: #f5a623; --bg: #f4f6f9; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; color: var(--navy); }
        .card { background: white; max-width: 900px; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .ledger-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .ledger-table th, .ledger-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .ledger-table th { background: #f8f9fa; font-size: 0.8rem; }
        .attest-box { background: #fffde7; border: 1px solid #ffe082; padding: 20px; margin-top: 20px; border-radius: 8px; }
        button { background: var(--teal); color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        @media print { .no-print { display: none; } .card { box-shadow: none; border: none; width: 100%; } }
    </style>
</head>
<body>

<div class="card" id="mainContainer">
    <div id="step1" class="no-print">
        <h2>EPCC Command Center</h2>
        <select id="clinic">
            <option value="addison">Addison Clinic</option>
            <option value="abrams">Abrams Clinic</option>
        </select>
        <button onclick="startSession()">START SESSION</button>
    </div>

    <div id="step2" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1 id="pdfHeader">Clinic Check-In Ledger</h1>
            <div id="pdfDate">DOS: 03/25/2026</div>
        </div>
        
        <table class="ledger-table" id="ledgerTable">
            <thead>
                <tr>
                    <th>MRN</th>
                    <th>DOB</th>
                    <th>DOS</th>
                    <th>Amount Due</th>
                    <th>Reason</th>
                </tr>
            </thead>
            <tbody id="ledgerBody"></tbody>
        </table>

        <div class="attest-box no-print">
            <h3>Final Attestation & Hand-off</h3>
            <label><input type="checkbox" id="check1"> eCW Schedule Verified against Master Ledger</label><br><br>
            <label><input type="checkbox" id="check2"> 7-Day Expiration Report sent to FO Manager</label><br><br>
            <label><input type="checkbox" id="check3"> Clinic Ledger PDF generated for FO Desk</label><br><br>
            <button onclick="finalize()">SIGN & PRINT LEDGER</button>
        </div>
    </div>
</div>

<script>
    const URLS = {
        master: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4gGPjhdADzgGE6mbCvdcoyRowychCXqzc5UiH_bmuDYnvr4nYQdfAlpV1T9mxVoAuYduLB41MYKk3/pub?gid=0&single=true&output=csv",
        addison: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQLQ6VUxmcN3zuUekU64pmCFKAy-bQaGG9tTfj7gwvF7J-FKyk9aox14wt1GHNbWhG40vd8b3dKlx7e/pub?gid=0&single=true&output=csv",
        abrams: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-4DKLyGq6oRheeLMAhyka8EWtqy74sOkfY2oblL5mocdWykBDEsx1i0JdqRJMwYGWde94dIRHiFPO/pub?gid=0&single=true&output=csv"
    };

    async function startSession() {
        const clinic = document.getElementById('clinic').value;
        const res1 = await fetch(URLS.master);
        const masterData = Papa.parse(await res1.text(), {header:true}).data;
        const res2 = await fetch(URLS[clinic]);
        const scheduleData = Papa.parse(await res2.text(), {header:true}).data;

        let html = "";
        scheduleData.forEach(p => {
            const member = masterData.find(m => m['MRN'] === p['Pat #']);
            if(!member) return; // Hide non-members per instruction

            const effDate = new Date(member['EffectiveDate']);
            const today = new Date();
            const diffDays = Math.floor((today - effDate) / (1000 * 60 * 60 * 24));
            
            // Logic for Add-on vs Plan Visit
            let amount = "$0.00";
            let reason = "Plan Visit";

            // If Q-Installment AND visit used (placeholder logic for visit count)
            if(member['Plan'].includes('Quarterly') && p['Appt Type'].includes('EST')) {
                // In future: add actual count check. For now, flag 7-day warning
                const daysToMilestone = 90 - (diffDays % 90);
                if(daysToMilestone <= 7) { amount = "$129.00"; reason = "Add-on (Renewal Due)"; }
            }

            html += `<tr><td>${p['Pat #']}</td><td>${p['Pat Birthdate']}</td><td>03/25/2026</td><td>${amount}</td><td>${reason}</td></tr>`;
        });

        document.getElementById('ledgerBody').innerHTML = html;
        document.getElementById('pdfHeader').innerText = clinic.toUpperCase() + " CLINIC";
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
    }

    function finalize() {
        if(!document.getElementById('check1').checked || !document.getElementById('check2').checked || !document.getElementById('check3').checked) {
            return alert("Complete all 3 attestation steps first.");
        }
        window.print();
    }
</script>
</body>
</html>
