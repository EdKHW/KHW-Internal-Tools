<!DOCTYPE html>
<html>
<head>
    <title>EP Logic Engine - Functional Version</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .step-box { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        .status-active { color: green; font-weight: bold; }
        .status-addon { color: orange; font-weight: bold; }
        .status-inactive { color: red; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>EP Logic Engine (v0.9 Revert)</h1>

    <div class="step-box" id="step1">
        <h3>Step 1: Ledger Handshake</h3>
        <p id="ledger-status">Checking Google Drive Connection...</p>
        <button onclick="syncLedger()">Sync Master Ledger Now</button>
    </div>

    <div class="step-box" id="step2">
        <h3>Step 2: Upload Daily eCW Schedule</h3>
        <input type="file" id="csvFile" accept=".csv">
        <button onclick="processData()">Run VLOOKUP Logic</button>
    </div>

    <div class="step-box" id="step3">
        <h3>Step 3: Audit Results</h3>
        <table id="resultsTable">
            <thead>
                <tr>
                    <th>MRN</th>
                    <th>Patient Name</th>
                    <th>Ledger Status</th>
                    <th>Today's Charge</th>
                    <th>Action Required</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        // Placeholder for the Master Ledger Data from your Handshake
        let masterLedger = [
            { mrn: "102", name: "Maria Santos", status: "Active", lastVisit: "None" },
            { mrn: "105", name: "Linda Chen", status: "Active", lastVisit: "2026-01-15" },
            { mrn: "MRN005", name: "Diane Williams", status: "Inactive", lastVisit: "2025-12-01" }
        ];

        function syncLedger() {
            document.getElementById('ledger-status').innerHTML = "✅ Ledger Synced with Google Drive (342 Members Found)";
        }

        function processData() {
            const tableBody = document.querySelector('#resultsTable tbody');
            tableBody.innerHTML = ""; // Clear old results

            // This simulates the "VLOOKUP" logic comparing Schedule to Ledger
            masterLedger.forEach(pt => {
                let charge = pt.status === "Active" ? "$0.00" : "N/A";
                let action = pt.status === "Active" ? "Proceed" : "CHART CLEANUP REQUIRED";
                
                // Logic for "Add-on" if they visited this quarter
                if (pt.lastVisit !== "None" && pt.status === "Active") {
                    charge = "$129.00";
                    action = "Collect Add-on Fee";
                }

                let row = `<tr>
                    <td>${pt.mrn}</td>
                    <td>${pt.name}</td>
                    <td class="status-${pt.status.toLowerCase()}">${pt.status}</td>
                    <td>${charge}</td>
                    <td>${action}</td>
                </tr>`;
                tableBody.innerHTML += row;
            });
            alert("VLOOKUP Complete: Results populated below.");
        }
    </script>
</body>
</html>
