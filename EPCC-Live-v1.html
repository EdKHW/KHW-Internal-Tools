<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPCC Membership Manager | KHW</title>
    <style>
        :root { --dark: #0f2942; --teal: #00bcd4; --gold: #ff9800; --success: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* Login Screen */
        #loginOverlay { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid var(--dark); text-align: center; width: 350px; }
        .login-input { display: block; width: 100%; margin: 15px 0; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        
        /* Dashboard (Hidden initially) */
        #appContent { display: none; width: 95%; max-width: 1100px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); flex-direction: column; }
        .tab-bar { display: flex; background: #fff; border-bottom: 1px solid #ddd; padding: 15px 30px 0; gap: 15px; }
        .tab { padding: 14px 20px; border: 1px solid #ddd; border-bottom: none; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: 700; color: #777; font-size: 12px; display: flex; align-items: center; gap: 8px; }
        .tab.active { background: #fff; color: var(--dark); border-top: 3px solid var(--dark); margin-top: -3px; }
        .badge { background: var(--teal); color: white; border-radius: 12px; padding: 2px 8px; font-size: 11px; }
        
        .content { padding: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #9aa1a7; font-size: 11px; text-transform: uppercase; padding: 10px; border-bottom: 2px solid #eee; }
        td { padding: 16px 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .btn { padding: 12px 25px; border-radius: 6px; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-main { background: var(--dark); color: white; margin-right: 10px; }
        .btn-next { background: var(--teal); color: white; }
        
        .footer { background: #f8f9fa; padding: 15px; border-top: 1px solid #eee; color: #777; font-size: 11px; text-align: center; border-radius: 0 0 8px 8px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <h2 style="color:var(--dark); margin-top:0;">EPCC STAFF LOGIN</h2>
    <input type="text" id="staffName" class="login-input" placeholder="Your Name">
    <input type="password" id="clinicPass" class="login-input" placeholder="Clinic Password">
    <button onclick="unfoldApp()" class="btn btn-main" style="width:100%; margin:0;">UNFOLD APP</button>
</div>

<div id="appContent">
    <div class="tab-bar">
        <div class="tab active" onclick="switchClinic('Addison')">🏥 ADDISON <span class="badge" id="count-addison">0</span></div>
        <div class="tab" onclick="switchClinic('Abrams')">🏥 ABRAMS <span class="badge" id="count-abrams">0</span></div>
        <div class="tab">⚠️ INACTIVE <span class="badge" style="background:var(--gold)">0</span></div>
    </div>

    <div class="content">
        <table id="auditTable">
            <thead>
                <tr><th>MRN</th><th>NAME</th><th>DOB</th><th>PLAN</th><th>STATUS</th></tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="5" style="text-align:center; padding:40px; color:#9
