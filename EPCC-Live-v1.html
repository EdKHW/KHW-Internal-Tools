<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPCC - Live Automated Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --teal: #008080; --dark: #001f3f; --success: #27ae60; --error: #e74c3c; --bg: #f4f7f6; --gold: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .header { background: var(--dark); color: white; padding: 15px 30px; border-bottom: 4px solid var(--gold); }
        .nav-steps { display: flex; justify-content: center; background: white; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .step-item { margin: 0 15px; text-align: center; color: #ccc; font-weight: bold; font-size: 0.8rem; }
        .step-item.active { color: var(--teal); }
        .main-card { background: white; max-width: 1000px; margin: 40px auto; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .sync-status-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin: 30px 0; }
        .sync-card { padding: 20px; border-radius: 10px; border: 1px solid #eee; background: #fafafa; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; background: #bbb; }
        .active-dot { background: var(--success); box-shadow: 0 0 8px var(--success); }
        button { background: #4dd0e1; color: white; border: none; padding: 18px 40px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1rem; }
        button:hover { background: var(--teal); }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { background: #f8f9fa; padding: 12px; border-bottom: 2px solid #dee2e6; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .pill { padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; }
        .match { background: #d4edda; color: #155724; }
        .no-match { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="header">
    <strong>EPCC — ESSENTIAL PLAN</strong> | COMMAND CENTER
</div>

<div class="nav-steps">
    <div class="step-item active" id="nav1">SIGN IN</div>
    <div class="step-item" id="nav2">SYNC DATA</div>
    <div class="step-item" id="nav3">RESULTS</div>
</div>

<div class="main-card">
    <div id="step1" class="step-content">
        <h2>Verify Identity</h2>
        <input type="password" id="accessCode" placeholder="Access Code" style="padding:15px; width:250px; border-radius:8px; border:1px solid #ddd;"><br><br>
        <button onclick="startSession()">Enter Command Center</button>
    </div>

    <div id="step2" style="display:none;">
        <h2>Cloud Data Pipeline</h2>
        <p>Connecting to Google Drive Master Buckets...</p>
        
        <div class="sync-status-grid">
            <div class="sync-card">
                <div id="dotMaster" class="status-dot"></div><strong>Member Ledger</strong>
                <div id="txtMaster" style="font-size:0.7rem; color:#888;">Connecting...</div>
            </div>
            <div class="sync-card">
                <div id="dotAddison" class="status-dot"></div><strong>Addison Schedule</strong>
                <div id="txtAddison" style="font-size:0.7rem; color:#888;">Connecting...</div>
            </div>
            <div class="sync-card">
                <div id="dotAbrams" class="status-dot"></div><strong>Abrams Schedule</strong>
                <div id="txtAbrams" style="font-size:0.7rem; color:#888;">Connecting...</div>
            </div>
        </div>
        
        <button id="processBtn" onclick="runAnalysis()" style="display:none;">Analyze Today's Patients →</button>
    </div>

    <div id="step3" style="display:none;">
        <div id="resultsArea"></div>
        <br>
        <button onclick="location.reload()" style="background:#95a5a6;">Refresh Data</button>
    </div>
</div>

<script>
    const SECRET = "Trinity@50Panda";
    
    const URLS = {
        master: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4gGPjhdADzgGE6mbCvdcoyRowychCXqzc5UiH_bmuDYnvr4nYQdfAlpV1T9mxVoAuYduLB41MYKk3/pub?gid=0&single=true&output=csv",
        addison: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQLQ6VUxmcN3zuUekU64pmCFKAy-bQaGG9tTfj7gwvF7J-FKyk9aox14wt1GHNbWhG40vd8b3dKlx7e/pub?gid=0&single=true&output=csv", 
        abrams: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-4DKLyGq6oRheeLMAhyka8EWtqy74sOkfY2oblL5mocdWykBDEsx1i0JdqRJMwYGWde94dIRHiFPO/pub?gid=0&single=true&output=csv"
    };

    let data = { master: [], addison: [], abrams: [] };

    function startSession() {
        if(document.getElementById('accessCode').value === SECRET) {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            syncAll();
        }
    }

    async function fetchData(key, dotId, txtId) {
        try {
            const resp = await fetch(URLS[key]);
            const text = await resp.text();
            const results = Papa.parse(text, {header:true, skipEmptyLines: true});
            data[key] = results.data;
            document.getElementById(dotId).classList.add('active-dot');
            document.getElementById(txtId).innerText = "✅ CONNECTED";
            return true;
        } catch(e) { 
            document.getElementById(txtId).innerText = "❌ OFFLINE";
            return false; 
        }
    }

    async function syncAll() {
        await fetchData('master', 'dotMaster', 'txtMaster');
        await fetchData('addison', 'dotAddison', 'txtAddison');
        await fetchData('abrams', 'dotAbrams', 'txtAbrams');
        document.getElementById('processBtn').style.display = 'inline-block';
        document.getElementById('nav2').classList.add('active');
    }

    function runAnalysis() {
        let html = `<table><tr><th>Clinic</th><th>Time</th><th>Patient</th><th>Pat #</th><th>Status</th></tr>`;
        
        ['addison', 'abrams'].forEach(loc => {
            data[loc].forEach(row => {
                const mrn = row['Pat #']?.trim();
                const dob = row['Pat Birthdate']?.trim();
                if(!mrn) return;

                const match = data.master.find(m => 
                    m['MRN']?.trim() === mrn && 
                    m['DOB']?.trim() === dob
                );

                const statusClass = match ? 'match' : 'no-match';
                const statusText = match ? 'ACTIVE MEMBER' : 'ADD-ON / NOT FOUND';
                
                html += `<tr>
                    <td style="text-transform:uppercase; font-size:0.7rem; font-weight:bold;">${loc}</td>
                    <td>${row['Time'] || '--'}</td>
                    <td>${row['Pat F Name'] || ''} ${row['Pat L Name'] || ''}</td>
                    <td>${mrn}</td>
                    <td><span class="pill ${statusClass}">${statusText}</span></td>
                </tr>`;
            });
        });

        html += `</table>`;
        document.getElementById('resultsArea').innerHTML = html;
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'block';
        document.getElementById('nav3').classList.add('active');
    }
</script>
</body>
</html>
