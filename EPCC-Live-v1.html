<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EPCC — Financial Decision Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --navy: #0d2340; --teal: #00BCD4; --gold: #f5a623; --success: #27ae60; --error: #e74c3c; --bg: #f4f6f9; }
        body { font-family: 'Barlow', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--navy); }
        .card { background: white; max-width: 800px; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: relative; }
        .nav-back { position: absolute; top: 15px; left: 15px; cursor: pointer; border: 1px solid #ddd; background: white; padding: 5px 10px; border-radius: 4px; font-size: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; background: #f8f9fa; padding: 12px; border-bottom: 2px solid #eee; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        
        .binary-zero { color: var(--success); font-weight: bold; background: #e6fffa; padding: 4px 8px; border-radius: 4px; }
        .binary-bill { color: var(--error); font-weight: bold; background: #fff5f5; padding: 4px 8px; border-radius: 4px; }
        .alert-fo { color: var(--gold); font-size: 0.7rem; display: block; margin-top: 4px; font-weight: bold; }
        
        input, select, button { padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #ddd; }
        .btn-main { background: var(--teal); color: white; border: none; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <div id="step1">
        <h2>EPCC Login</h2>
        <input type="text" id="userName" placeholder="Team Lead Name"><br>
        <select id="clinic">
            <option value="">Select Clinic</option>
            <option value="addison">Addison</option>
            <option value="abrams">Abrams</option>
        </select><br>
        <input type="password" id="pass" placeholder="Access Code"><br>
        <button class="btn-main" onclick="checkAuth()">UNLOCK ENGINE</button>
    </div>

    <div id="step2" style="display:none;">
        <button class="nav-back" onclick="location.reload()">LOGOUT</button>
        <h2>Syncing Source of Truth...</h2>
        <div id="status"></div>
        <button id="runBtn" class="btn-main" style="display:none;" onclick="processAnalysis()">GENERATE CHECK-IN REPORT</button>
    </div>

    <div id="step3" style="display:none;">
        <button class="nav-back" onclick="goStep(2)">BACK</button>
        <h2>Check-In Ledger</h2>
        <div id="results"></div>
        <br>
        <button class="btn-main" onclick="window.print()">GENERATE FO PDF REPORT</button>
    </div>
</div>

<script>
    const SECRET = "Trinity@50Panda";
    const URLS = {
        master: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4gGPjhdADzgGE6mbCvdcoyRowychCXqzc5UiH_bmuDYnvr4nYQdfAlpV1T9mxVoAuYduLB41MYKk3/pub?gid=0&single=true&output=csv",
        addison: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQLQ6VUxmcN3zuUekU64pmCFKAy-bQaGG9tTfj7gwvF7J-FKyk9aox14wt1GHNbWhG40vd8b3dKlx7e/pub?gid=0&single=true&output=csv",
        abrams: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-4DKLyGq6oRheeLMAhyka8EWtqy74sOkfY2oblL5mocdWykBDEsx1i0JdqRJMwYGWde94dIRHiFPO/pub?gid=0&single=true&output=csv"
    };

    let raw = { master: [], current: [] };

    function goStep(n) { [1,2,3].forEach(i => document.getElementById('step'+i).style.display = (i===n ? 'block' : 'none')); }

    function checkAuth() {
        if(document.getElementById('pass').value === SECRET) { goStep(2); sync(); }
        else alert("Unauthorized");
    }

    async function sync() {
        const c = document.getElementById('clinic').value;
        const res1 = await fetch(URLS.master);
        raw.master = Papa.parse(await res1.text(), {header:true}).data;
        const res2 = await fetch(URLS[c]);
        raw.current = Papa.parse(await res2.text(), {header:true}).data;
        document.getElementById('status').innerText = "✅ Source of Truth Synced.";
        document.getElementById('runBtn').style.display = 'block';
    }

    function processAnalysis() {
        const today = new Date();
        let html = "<table><tr><th>Patient</th><th>MRN</th><th>Instruction for FO</th></tr>";
        
        raw.current.forEach(p => {
            const match = raw.master.find(m => m['MRN'] === p['Pat #']);
            if(!match) return; // Hide non-members

            const effDate = new Date(match['EffectiveDate']);
            const diffDays = Math.floor((today - effDate) / (1000 * 60 * 60 * 24));
            const yearDay = diffDays % 365;
            const quarter = Math.floor(yearDay / 90) + 1;
            
            // 7-Day Warning Check
            const daysToNextMilestone = 90 - (yearDay % 90);
            const isWarning = (daysToNextMilestone <= 7);

            let amount = "Amount Due: $0.00";
            let css = "binary-zero";
            let note = "(Within Membership Period)";

            // Logic: If they are on a Quarterly plan and the installment is due (Warning)
            if (match['Plan'].includes('Quarterly') && isWarning) {
                amount = "Amount Due: $129.00";
                css = "binary-bill";
                note = `<span class="alert-fo">⚠️ FO ACTION: RENEW QUARTERLY CARD ON FILE</span>`;
            } else if (diffDays >= 360 && isWarning) {
                amount = "Amount Due: $129.00";
                css = "binary-bill";
                note = `<span class="alert-fo">⚠️ FO ACTION: ANNUAL EVERGREEN RENEWAL DUE</span>`;
            }

            html += `<tr>
                <td>${p['Pat F Name']} ${p['Pat L Name']}</td>
                <td>${p['Pat #']}</td>
                <td><span class="${css}">${amount}</span><br>${note}</td>
            </tr>`;
        });

        document.getElementById('results').innerHTML = html + "</table>";
        goStep(3);
    }
</script>
</body>
</html>
