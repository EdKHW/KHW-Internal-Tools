<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPCC — Essential Plan Command Center (Automated v2)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&display=swap');
        :root { --navy: #0d2340; --teal: #00BCD4; --gold: #f5a623; --success: #27ae60; --error: #e74c3c; --bg: #f4f6f9; }
        body { font-family: 'Barlow', sans-serif; background: var(--bg); margin: 0; color: #1a2e44; }
        
        /* HEADER & TRACKER */
        .topbar { background: var(--navy); color: white; padding: 15px 30px; border-bottom: 4px solid var(--gold); display: flex; justify-content: space-between; }
        .tracker { display: flex; justify-content: center; background: white; padding: 20px; border-bottom: 1px solid #dbe5ee; }
        .step { margin: 0 15px; font-size: 0.8rem; font-weight: 700; color: #cbd5e0; position: relative; }
        .step.active { color: var(--teal); border-bottom: 2px solid var(--teal); }
        .step.done { color: var(--success); }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 40px; text-align: center; min-height: 400px; position: relative; }
        
        /* TABS FOR STEP 4 */
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab-btn { padding: 10px 25px; cursor: pointer; border: none; background: none; font-weight: 600; color: #666; }
        .tab-btn.active { color: var(--teal); border-bottom: 3px solid var(--teal); }

        /* RECOVERY CHECKLIST */
        .checklist { text-align: left; background: #fffbf0; border: 1px solid var(--gold); padding: 20px; border-radius: 8px; margin: 20px 0; }
        .check-item { margin-bottom: 10px; display: flex; align-items: center; }
        
        button.primary { background: var(--teal); color: white; border: none; padding: 15px 35px; border-radius: 6px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        button.primary:disabled { background: #ccc; cursor: not-allowed; }
        .back-btn { position: absolute; top: 20px; left: 20px; background: none; border: none; color: #888; cursor: pointer; font-weight: 600; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
        .bg-active { background: #d4edda; color: #155724; }
        .bg-warning { background: #fff3cd; color: #856404; }
        .bg-error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="topbar">
    <div><strong>EPCC</strong> COMMAND CENTER</div>
    <div id="clinicDisplay" style="font-size: 0.8rem; color: var(--gold);">SESSION INACTIVE</div>
</div>

<div class="tracker">
    <div class="step active" id="s1">1. IDENTITY</div>
    <div class="step" id="s2">2. SYNC</div>
    <div class="step" id="s3">3. ANALYSIS</div>
    <div class="step" id="s4">4. FINANCIALS</div>
    <div class="step" id="s5">5. ATTEST</div>
    <div class="step" id="s6">6. DONE</div>
</div>

<div class="container">
    <div class="card">
        <div id="step1">
            <h2>Verify Command Access</h2>
            <input type="password" id="pass" placeholder="Access Code" style="padding:12px; width:250px; border:1px solid #ddd; border-radius:6px;"><br><br>
            <button class="primary" onclick="checkPass()">Unlock "Brain" Logic</button>
        </div>

        <div id="step2" style="display:none;">
            <h2>Establishing Data Pipeline...</h2>
            <p>Pulling Master Ledger and Schedules via Cloud Sync.</p>
            <div id="syncList" style="margin: 20px 0;"></div>
            <button id="btnProcess" class="primary" onclick="runBrain()" style="display:none;">Begin Financial Audit →</button>
        </div>

        <div id="step4" style="display:none;">
            <button class="back-btn" onclick="goStep(2)">← BACK</button>
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('active')">ACTIVE MEMBERS</button>
                <button class="tab-btn" onclick="showTab('warning')">RENEWALS/QUARTERLY</button>
                <button class="tab-btn" onclick="showTab('error')">INACTIVE/ADD-ONS</button>
            </div>
            <div id="tabContent"></div>
            <br>
            <button class="primary" onclick="goStep(5)">Proceed to Attestation →</button>
        </div>

        <div id="step5" style="display:none;">
            <h2>Final Financial Sign-off</h2>
            <div class="checklist">
                <div class="check-item"><input type="checkbox" id="c1"> <label>I have reviewed all "Add-ons" and verified eligibility.</label></div>
                <div class="check-item"><input type="checkbox" id="c2"> <label>I have confirmed Quarterly payments are processed or flagged.</label></div>
                <div class="check-item"><input type="checkbox" id="c3"> <label>I have sent the "Expiring Report" to the FO Manager.</label></div>
            </div>
            <input type="text" id="sig" placeholder="Type Full Name to Sign" style="padding:12px; width:300px;"><br><br>
            <button class="primary" onclick="finish()">Complete Session</button>
        </div>

        <div id="step6" style="display:none;">
            <h1 style="color: var(--success);">✔ SESSION COMPLETE</h1>
            <p>Financial audit log has been updated.</p>
            <button class="primary" onclick="location.reload()">Start New Session</button>
        </div>
    </div>
</div>

<script>
    const SECRET = "Trinity@50Panda";
    const URLS = {
        master: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4gGPjhdADzgGE6mbCvdcoyRowychCXqzc5UiH_bmuDYnvr4nYQdfAlpV1T9mxVoAuYduLB41MYKk3/pub?gid=0&single=true&output=csv",
        addison: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQLQ6VUxmcN3zuUekU64pmCFKAy-bQaGG9tTfj7gwvF7J-FKyk9aox14wt1GHNbWhG40vd8b3dKlx7e/pub?gid=0&single=true&output=csv",
        abrams: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-4DKLyGq6oRheeLMAhyka8EWtqy74sOkfY2oblL5mocdWykBDEsx1i0JdqRJMwYGWde94dIRHiFPO/pub?gid=0&single=true&output=csv"
    };

    let store = { master:[], addison:[], abrams:[], results: {active:[], warning:[], error:[]} };

    function checkPass() {
        if(document.getElementById('pass').value === SECRET) { goStep(2); sync(); }
        else alert("Unauthorized");
    }

    async function sync() {
        const keys = ['master', 'addison', 'abrams'];
        for(let k of keys) {
            try {
                const r = await fetch(URLS[k]);
                const t = await r.text();
                store[k] = Papa.parse(t, {header:true, skipEmptyLines:true}).data;
                document.getElementById('syncList').innerHTML += `<div style="color:var(--success)">✅ ${k.toUpperCase()} Connected</div>`;
            } catch(e) { document.getElementById('syncList').innerHTML += `<div style="color:var(--error)">❌ ${k.toUpperCase()} Failed</div>`; }
        }
        document.getElementById('btnProcess').style.display = 'inline-block';
    }

    function runBrain() {
        store.results = {active:[], warning:[], error:[]};
        const today = new Date();
        
        ['addison', 'abrams'].forEach(loc => {
            store[loc].forEach(p => {
                const mrn = p['Pat #']?.trim();
                if(!mrn) return;
                
                const match = store.master.find(m => m['MRN']?.trim() === mrn);
                
                if(!match) {
                    store.results.error.push({...p, loc, reason: "NOT IN LEDGER"});
                } else {
                    const nextPay = new Date(match['Next_Payment_Date']);
                    const diffDays = (nextPay - today) / (1000 * 60 * 60 * 24);
                    
                    if(diffDays <= 7) {
                        store.results.warning.push({...p, ...match, loc, reason: "PAYMENT DUE"});
                    } else {
                        store.results.active.push({...p, ...match, loc});
                    }
                }
            });
        });
        showTab('active');
        goStep(4);
    }

    function showTab(type) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event?.target?.classList?.add('active');
        
        let html = `<table><tr><th>Clinic</th><th>Patient</th><th>MRN</th><th>Status</th></tr>`;
        store.results[type].forEach(r => {
            const badge = type === 'active' ? 'bg-active' : (type === 'warning' ? 'bg-warning' : 'bg-error');
            html += `<tr><td>${r.loc.toUpperCase()}</td><td>${r['Pat F Name']} ${r['Pat L Name']}</td><td>${r['Pat #']}</td><td><span class="badge ${badge}">${type.toUpperCase()}</span></td></tr>`;
        });
        document.getElementById('tabContent').innerHTML = html + `</table>`;
    }

    function goStep(n) {
        for(let i=1; i<=6; i++) {
            document.getElementById('step'+i) && (document.getElementById('step'+i).style.display = 'none');
            const s = document.getElementById('s'+i);
            s.classList.remove('active', 'done');
            if(i < n) s.classList.add('done');
            if(i === n) s.classList.add('active');
        }
        document.getElementById('step'+n).style.display = 'block';
    }

    function finish() {
        if(!document.getElementById('c3').checked || !document.getElementById('sig').value) {
            alert("Attestation and Signature Required");
            return;
        }
        goStep(6);
    }
</script>
</body>
</html>
