<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPCC — Kokoro Health & Wellness</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&display=swap');
        :root { --navy: #0d2340; --teal: #00BCD4; --gold: #f5a623; --success: #27ae60; --error: #e74c3c; --bg: #f4f6f9; }
        body { font-family: 'Barlow', sans-serif; background: var(--bg); margin: 0; color: #1a2e44; display: flex; flex-direction: column; min-height: 100vh; }
        
        .topbar { background: var(--navy); color: white; padding: 10px 30px; border-bottom: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-circle { width: 45px; height: 45px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid var(--gold); }
        .logo-circle img { width: 100%; height: auto; }
        
        .tracker { display: flex; justify-content: center; background: white; padding: 15px; border-bottom: 1px solid #dbe5ee; }
        .step { margin: 0 12px; font-size: 0.75rem; font-weight: 700; color: #cbd5e0; text-transform: uppercase; }
        .step.active { color: var(--teal); border-bottom: 2px solid var(--teal); }
        .step.done { color: var(--success); }

        .container { flex: 1; max-width: 1000px; margin: 30px auto; width: 95%; }
        .card { background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 40px; text-align: center; position: relative; min-height: 450px; }
        
        .nav-back { position: absolute; top: 20px; left: 20px; background: #f0f4f8; border: none; color: #5a7184; padding: 8px 15px; border-radius: 5px; font-size: 0.7rem; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .nav-back:hover { background: #dbe5ee; color: var(--navy); }

        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; margin-bottom: 15px; width: 280px; }
        button.primary { background: var(--teal); color: white; border: none; padding: 15px 40px; border-radius: 6px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab-btn { padding: 12px 20px; cursor: pointer; border: none; background: none; font-weight: 600; color: #666; font-size: 0.85rem; }
        .tab-btn.active { color: var(--teal); border-bottom: 3px solid var(--teal); }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #f8f9fa; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; text-align: left; }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; }
        .bg-active { background: #e6fffa; color: #234e52; }
        .bg-warning { background: #fffaf0; color: #744210; }
        .bg-error { background: #fff5f5; color: #822727; }

        .legal-notice { font-size: 0.65rem; color: #999; margin-top: 30px; line-height: 1.4; border-top: 1px solid #eee; padding-top: 15px; }
        footer { background: #f8f9fa; text-align: center; padding: 20px; font-size: 0.75rem; color: #666; border-top: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo-area">
        <div class="logo-circle"><img src="photo-01.jpg" alt="Logo"></div>
        <div><strong>KOKORO HEALTH & WELLNESS</strong><br><small style="color:var(--gold)">EPCC COMMAND CENTER</small></div>
    </div>
    <div id="sessionUser" style="font-size:0.75rem; font-weight:600;">UNAUTHORIZED</div>
</div>

<div class="tracker">
    <div class="step active" id="s1">Identity</div>
    <div class="step" id="s2">Sync</div>
    <div class="step" id="s3">Analysis</div>
    <div class="step" id="s4">Financials</div>
    <div class="step" id="s5">Attest</div>
