<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPCC - Phase 1 Live Sync</title>
    <style>
        :root { --teal: #008080; --dark: #2c3e50; --success: #27ae60; --error: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: var(--teal); margin-bottom: 0.5rem; }
        .step { display: none; }
        .step.active { display: block; }
        input { width: 80%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 6px; font-size: 1rem; }
        button { background: var(--teal); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .status-box { margin-top: 20px; padding: 15px; border: 1px dashed var(--teal); border-radius: 6px; background: #f0fdfa; }
        .err { color: var(--error); font-size: 0.9rem; margin-top: 5px; min-height: 1.2rem; }
        #ledgerStatus { font-weight: bold; margin-bottom: 10px; }
        .secondary-btn { background: #95a5a6; margin-top: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>EPCC Portal</h1>
    <p id="sub-head">Clinic Workflow Assistant</p>

    <div id="step1" class="step active">
        <h3>Team Lead Sign-In</h3>
        <input type="text" id="tlName" placeholder="Your Name">
        <input type="password" id="accessCode" placeholder="Access Code">
        <div id="tlErr" class="err"></div>
        <button onclick="validateAndStart()">Start Session</button>
    </div>

    <div id="step2" class="step">
        <h3>System Readiness</h3>
        <p>Welcome, <span id="tlDisplay" style="font-weight:bold; color:var(--teal);"></span></p>
        
        <div class="status-box">
            <div id="ledgerStatus">Initializing Handshake...</div>
            <div id="ledgerProgress" style="font-size: 0.8rem; color: #666;">Contacting Google Cloud Storage...</div>
        </div>

        <button id="nextBtn" style="margin-top:20px; display:none;" onclick="alert('Proceeding to Schedule Analysis...')">Continue to Schedule</button>
        
        <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">
        <p style="font-size: 0.8rem; color: #7f8c8d;">Training Mode:</p>
        <button class="secondary-btn" onclick="loadSampleData()">Load Sample Ledger</button>
    </div>
</div>

<script>
    const SECRET_KEY = "Trinity@50Panda";
    const GOOGLE_LINK = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4gGPjhdADzgGE6mbCvdcoyRowychCXqzc5UiH_bmuDYnvr4nYQdfAlpV1T9mxVoAuYduLB41MYKk3/pub?gid=0&single=true&output=csv";
    
    let masterData = [];

    function validateAndStart() {
        const name = document.getElementById('tlName').value.trim();
        const code = document.getElementById('accessCode').value.trim();
        const err = document.getElementById('tlErr');

        if (!name) { err.textContent = "Please enter your name."; return; }
        if (code !== SECRET_KEY) { err.textContent = "Invalid Access Code."; return; }

        document.getElementById('tlDisplay').textContent = name;
        showStep(2);
        performHandshake();
    }

    async function performHandshake() {
        const status = document.getElementById('ledgerStatus');
        const progress = document.getElementById('ledgerProgress');
        
        try {
            const response = await fetch(GOOGLE_LINK);
            if (!response.ok) throw new Error('Network error');
            const data = await response.text();
            
            // Success!
            masterData = data; 
            status.textContent = "Live Sync: ACTIVE";
            status.style.color = "var(--success)";
            progress.textContent = "Master Ledger connection verified.";
            document.getElementById('nextBtn').style.display = 'inline-block';
            
        } catch (e) {
            status.textContent = "Connection Failed";
            status.style.color = "var(--error)";
            progress.textContent = "Could not reach Google. Check internet or use Training Mode.";
        }
    }

    function loadSampleData() {
        masterData = "Sample User, Active, 2024-01-01";
        document.getElementById('ledgerStatus').textContent = "TRAINING MODE ACTIVE";
        document.getElementById('ledgerStatus').style.color = "var(--teal)";
        document.getElementById('ledgerProgress').textContent = "Using offline sample data.";
        document.getElementById('nextBtn').style.display = 'inline-block';
    }

    function showStep(num) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + num).classList.add('active');
    }
</script>

</body>
</html>
