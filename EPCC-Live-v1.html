<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EPCC Daily Workflow</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --navy: #0d2340; --teal: #00BCD4; --gold: #f5a623; --bg: #f4f6f9; --success: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--navy); }
        .container { max-width: 1000px; margin: 40px auto; background: white; border-radius: 12px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        /* THE HEADER FIX: Forces Horizontal */
        .tracker { display: flex !important; flex-direction: row !important; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .step { flex: 1; text-align: center; }
        .step-circle { width: 35px; height: 35px; border-radius: 50%; background: #e5e7eb; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; color: #6b7280; margin-bottom: 5px; }
        .step.active .step-circle { background: var(--teal); color: white; border: 3px solid white; outline: 2px solid var(--teal); }
        .step.completed .step-circle { background: var(--success); color: white; }
        .step small { display: block; font-size: 10px; font-weight: bold; color: #9ca3af; text-transform: uppercase; }

        /* Results Dashboard */
        .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 30px 0; }
        .metric-card { background: var(--navy); color: white; padding: 20px; border-radius: 8px; text-align: center; border-bottom: 4px solid var(--gold); }
        .metric-card h1 { margin: 0; font-size: 32px; color: var(--gold); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; background: #fafafa; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .btn { background: var(--teal); color: white; border: none; padding: 15px 30px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="tracker">
        <div id="step-1" class="step active"><div class="step-circle">1</div><small>SIGN IN</small></div>
        <div id="step-2" class="step"><div class="step-circle">2</div><small>LEDGER</small></div>
        <div id="step-3" class="step"><div class="step-circle">3</div><small>SCHEDULES</small></div>
        <div id="step-4" class="step"><div class="step-circle">4</div><small>RESULTS</small></div>
        <div id="step-5" class="step"><div class="step-circle">5</div><small>ATTEST</small></div>
        <div id="step-6" class="step"><div class="step-circle">6</div><small>DONE</small></div>
    </div>

    <div id="start-screen" style="text-align: center;">
        <h2>EPCC Command Center</h2>
        <p>Syncing Live with Master Ledger & Clinic Schedules</p>
        <div style="margin: 30px 0;">
            <select id="clinicSelect" style="padding: 12px; width: 250px; border-radius: 6px; border: 1px solid #ccc;">
                <option value="addison">Addison Clinic</option>
                <option value="abrams">Abrams Clinic</option>
            </select>
            <button class="btn" onclick="runAutomation()">START AUDIT →</button>
        </div>
    </div>

    <div id="results-screen" class="hidden">
        <div class="metrics-grid">
            <div class="metric-card"><h1 id="m-count">0</h1>SUPERBILLS</div>
            <div class="metric-card"><h1>0</h1>ACTIONS</div>
            <div class="metric-card"><h1>0</h1>EXPIRING</div>
            <div class="metric-card"><h1>03/25</h1>DOS</div>
        </div>

        <table>
            <thead>
                <tr><th>MRN</th><th>PATIENT NAME</th><th>PLAN</th><th>STATUS</th></tr>
            </thead>
            <tbody id="result-rows"></tbody>
        </table>
    </div>
</div>

<script>
    const URLS = {
        master: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4gGPjhdADzgGE6mbCvdcoyRowychCXqzc5UiH_bmuDYnvr4nYQdfAlpV1T9mxVoAuYduLB41MYKk3/pub?gid=0&single=true&output=csv",
        addison: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQLQ6VUxmcN3zuUekU64pmCFKAy-bQaGG9tTfj7gwvF7J-FKyk9aox14wt1GHNbWhG40vd8b3dKlx7e/pub?gid=0&single=true&output=csv",
        abrams: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-4DKLyGq6oRheeLMAhyka8EWtqy74sOkfY2oblL5mocdWykBDEsx1i0JdqRJMwYGWde94dIRHiFPO/pub?gid=0&single=true&output=csv"
    };

    async function runAutomation() {
        const clinic = document.getElementById('clinicSelect').value;
        
        // UI Change
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.remove('hidden');
        document.getElementById('step-1').className = "step completed";
        document.getElementById('step-2').className = "step completed";
        document.getElementById('step-3').className = "step completed";
        document.getElementById('step-4').className = "step active";

        try {
            // THE AUTOMATION: Fetching both sheets
            const [masterRes, clinicRes] = await Promise.all([fetch(URLS.master), fetch(URLS[clinic])]);
            const masterData = Papa.parse(await masterRes.text(), {header:true}).data;
            const clinicData = Papa.parse(await clinicRes.text(), {header:true}).data;

            let html = "";
            let matchCount = 0;

            // THE LOGIC: Compare Schedule to Ledger
            clinicData.forEach(row => {
                const id = row['Pat #'] || row['MRN'];
                const match = masterData.find(m => m['MRN'] === id);
                
                if(match) {
                    matchCount++;
                    html += `<tr>
                        <td>${id}</td>
                        <td>${row['Patient Name'] || 'Member'}</td>
                        <td>${match['Plan'] || 'EP Standard'}</td>
                        <td><b style="color:var(--success)">Active</b></td>
                    </tr>`;
                }
            });

            document.getElementById('result-rows').innerHTML = html;
            document.getElementById('m-count').innerText = matchCount;

        } catch (err) {
            alert("Handshake failed. Check Internet or Google Sheet publishing.");
        }
    }
</script>
</body>
</html>
